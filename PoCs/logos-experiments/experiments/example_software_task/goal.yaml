objective: |
  Implement a retry mechanism for the EventBus publish method.
  When a publish fails due to a transient Redis error, it should retry
  up to 3 times with exponential backoff before raising.

success_criteria:
  - metric: test_pass_rate
    threshold: 1.0
    primary: true
    description: All pytest tests in eval/ must pass

eval: eval/

context: |
  The EventBus currently fires and forgets. In production, transient
  Redis disconnects cause silent message loss. A retry with backoff
  would handle brief network blips without blocking the caller for
  too long.

notes: |
  This is an example ticket for a software engineering task.
  The eval uses pytest (test suite pass/fail) rather than custom metrics.
